# LangChain Chat 全局配置文件

app:
  name: langchain-chat
  version: 0.1.0
  env: development

models:
  default: deepseek-chat
  available:
    - name: DeepSeek Chat
      value: deepseek-chat
      provider: deepseek
      base_url: https://api.deepseek.com/v1
      env_key: API_KEY
    - name: Qwen Plus
      value: qwen-plus
      provider: qwen
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      env_key: QWEN_API_KEY

model:
  default_provider: openai
  default_model: gpt-4o-mini

llm:
  timeout: 60
  max_retries: 3
  temperature: 0.7

storage:
  type: sqlite
  sqlite:
    path: data/sqlite/app.db
  mysql:
    host: localhost
    port: 3306
    user: root
    database: langchain_chat
    charset: utf8mb4
  file:
    base_dir: data/file_storage

tui:
  theme: default

