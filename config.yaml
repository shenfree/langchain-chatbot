# LangChain Chat 全局配置文件
# Step 6 增加 llm 配置，ChatEngine 会优先读取 .env 中的模型连接信息。

app:
  name: langchain-chat
  version: 0.1.0
  env: development

model:
  default_provider: openai
  default_model: gpt-4o-mini

llm:
  timeout: 60
  max_retries: 3
  temperature: 0.7

storage:
  type: sqlite
  sqlite:
    path: data/sqlite/app.db

tui:
  theme: default
