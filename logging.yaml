version: 1

disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(module)s:%(lineno)d | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: logs/app.log
    maxBytes: 1048576
    backupCount: 3
    encoding: utf-8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: standard
    filename: logs/error.log
    maxBytes: 1048576
    backupCount: 3
    encoding: utf-8

root:
  level: INFO
  handlers: [console, file, error_file]

loggers:
  src:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: false
  scripts:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: false
